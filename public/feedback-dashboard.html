<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feedback Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem 2rem; background: #0d1117; color: #e6edf3; }
    h1 { margin: 0 0 1rem 0; font-size: 1.5rem; }
    .toolbar { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
    .toolbar label { display: flex; align-items: center; gap: 0.5rem; }
    .toolbar select { padding: 0.35rem 0.5rem; background: #21262d; border: 1px solid #30363d; color: #e6edf3; border-radius: 4px; }
    .toolbar input[type="password"] { padding: 0.35rem 0.5rem; background: #21262d; border: 1px solid #30363d; color: #e6edf3; border-radius: 4px; width: 180px; }
    button { padding: 0.5rem 1rem; background: #238636; border: 1px solid #2ea043; color: #fff; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    button.secondary { background: #21262d; border-color: #30363d; }
    button:hover { opacity: 0.9; }
    .error { color: #f85149; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #21262d; }
    th { color: #8b949e; font-weight: 600; }
    tr:hover { background: #161b22; }
    .msg { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .expand { cursor: pointer; color: #58a6ff; }
    .system-info { font-size: 0.8rem; color: #8b949e; padding: 0.5rem; background: #161b22; margin-top: 0.25rem; border-radius: 4px; white-space: pre-wrap; word-break: break-all; }
    .empty { color: #8b949e; padding: 2rem; }
  </style>
</head>
<body>
  <h1>Feedback Dashboard</h1>
  <div class="toolbar">
    <label>Key: <input type="password" id="key" placeholder="Optional dashboard key" /></label>
    <button id="load">Load</button>
    <label>Type: <select id="filter-type"><option value="">All</option><option value="feedback">Feedback</option><option value="bug">Bug Report</option></select></label>
    <button id="export-csv" class="secondary">Export CSV</button>
  </div>
  <div id="error" class="error" style="display:none;"></div>
  <div id="table-wrap"></div>

  <script>
    var API_BASE = location.hostname === "localhost" || location.hostname === "127.0.0.1"
      ? "http://localhost:2567"
      : "https://us-ord-23ba76a6.colyseus.cloud";
    var data = [];

    function showError(msg) {
      var el = document.getElementById("error");
      el.textContent = msg;
      el.style.display = msg ? "block" : "none";
    }

    async function load() {
      var key = document.getElementById("key").value.trim();
      var url = key ? API_BASE + "/api/feedback?key=" + encodeURIComponent(key) : API_BASE + "/api/feedback";
      try {
        var res = await fetch(url);
        if (!res.ok) {
          if (res.status === 401) throw new Error("Invalid or missing key");
          throw new Error(res.statusText || "Load failed");
        }
        data = await res.json();
        showError("");
        render();
      } catch (e) {
        showError(e.message);
        data = [];
        render();
      }
    }

    function getFiltered() {
      var typeFilter = document.getElementById("filter-type").value;
      if (!typeFilter) return data;
      return data.filter(function(r) { return r.type === typeFilter; });
    }

    function escapeHtml(s) {
      var div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }
    function escapeAttr(s) {
      return escapeHtml(s).replace(/"/g, "&quot;");
    }
    function formatRatings(r) {
      if (!r || typeof r !== "object") return "—";
      var parts = [];
      if (typeof r.gameplay === "number") parts.push("G:" + r.gameplay);
      if (typeof r.performance === "number") parts.push("P:" + r.performance);
      if (typeof r.graphics === "number") parts.push("Gr:" + r.graphics);
      if (typeof r.overall === "number") parts.push("O:" + r.overall);
      return parts.length ? parts.join(" ") : "—";
    }

    function render() {
      var list = getFiltered();
      var wrap = document.getElementById("table-wrap");
      if (list.length === 0) {
        wrap.innerHTML = "<p class=\"empty\">No feedback entries.</p>";
        return;
      }
      wrap.innerHTML = "<table><thead><tr><th>Date</th><th>Type</th><th>Name</th><th>Email</th><th>Message</th><th>Ratings</th><th></th></tr></thead><tbody>" +
        list.map(function(row, i) {
          var msg = row.message || "";
          return "<tr data-i=\"" + i + "\"><td>" + new Date(row.createdAt).toLocaleString() + "</td><td>" + (row.type || "") + "</td><td>" + escapeHtml(row.name || "") + "</td><td>" + escapeHtml(row.email || "") + "</td><td class=\"msg\" title=\"" + escapeAttr(msg) + "\">" + escapeHtml(msg.slice(0, 60)) + (msg.length > 60 ? "…" : "") + "</td><td>" + formatRatings(row.ratings) + "</td><td><span class=\"expand\" data-i=\"" + i + "\">Details</span></td></tr><tr data-detail=\"" + i + "\" style=\"display:none;\"><td colspan=\"7\"><div class=\"system-info\">" + escapeHtml(JSON.stringify(row.systemInfo || {}, null, 2)) + "</div><div class=\"system-info\" style=\"margin-top:0.5rem;\"><strong>Full message:</strong><br/>" + escapeHtml(msg) + "</div></td></tr>";
        }).join("") +
        "</tbody></table>";
      wrap.querySelectorAll(".expand").forEach(function(el) {
        el.addEventListener("click", function() {
          var i = el.dataset.i;
          var detail = wrap.querySelector("tr[data-detail=\"" + i + "\"]");
          detail.style.display = detail.style.display === "none" ? "table-row" : "none";
        });
      });
    }

    function exportCsv() {
      var list = getFiltered();
      if (list.length === 0) return;
      var headers = ["createdAt", "type", "name", "email", "message", "gameplay", "performance", "graphics", "overall"];
      var rows = list.map(function(r) {
        var ratings = r.ratings || {};
        return [r.createdAt, r.type, r.name || "", r.email || "", (r.message || "").replace(/"/g, '""'), ratings.gameplay ?? "", ratings.performance ?? "", ratings.graphics ?? "", ratings.overall ?? ""].map(function(c) { return "\"" + String(c).replace(/"/g, '""') + "\""; }).join(",");
      });
      var csv = [headers.join(",")].concat(rows).join("\n");
      var a = document.createElement("a");
      a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
      a.download = "feedback-" + new Date().toISOString().slice(0, 10) + ".csv";
      a.click();
    }

    document.getElementById("load").addEventListener("click", load);
    document.getElementById("filter-type").addEventListener("change", render);
    document.getElementById("export-csv").addEventListener("click", exportCsv);
    load();
  </script>
</body>
</html>
